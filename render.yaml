# Render Blueprint — deploys the FastAPI backend.
# In Render: New → Blueprint → connect this repo. Then set the 3 secret env vars
# (marked sync:false) in the dashboard. Free plan sleeps after inactivity (~50s cold start).
services:
  - type: web
    name: primebook-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      # Dedicated Groq key for the live Content Strategy AI (separate quota).
      - key: GROQ_API_KEY_STUDIO
        sync: false
# Frontend is deployed separately on Vercel (auto-deploys from main;
# VITE_API_URL is set in the Vercel project settings).
